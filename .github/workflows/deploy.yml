name: Deploy App Louvor para Hostinger via FTP (manual, fallback)

# FASE 01 (ciclo v7), 2026-07-16: achado crítico #2 — o webhook nativo da Hostinger
# (GitHub → webhooks.hostinger.com/deploy/...) confirma entrega 200 a cada push, mas PAROU
# de aplicar deploys de verdade (motivo provável: Hostinger migrou pra um produto novo
# "Git Auto Deployments" no hPanel e o webhook antigo virou vestigial — só faz ACK, não clona
# mais nada). Confirmado: depois do push da FASE 01, `applouvor/site/` em produção continuou
# com o esqueleto da FASE 00 (sem router.php etc.), mesmo com o webhook "OK".
#
# server-dir corrigido para o caminho REAL que o subdomínio louvor.vilela.eng.br serve
# (achado da FASE 00): /domains/vilela.eng.br/public_html/applouvor/site/ — NÃO a pasta órfã
# antiga (/domains/louvor.vilela.eng.br/public_html/). Este workflow FTP volta a ser o
# mecanismo confiável (o mesmo padrão que o vilela-site usa com sucesso) — continua manual
# (workflow_dispatch) até o Diego decidir se quer voltar o gatilho automático no push.
# Ver .governanca/fases/FASE-01-PLANO.md §"Achado durante a verificação".

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # Credenciais de banco NÃO viajam pelo pipeline. O PHP em produção lê
      # DB_HOST/DB_NAME/DB_USER/DB_PASS via getenv(), lidas de um .env colocado manualmente
      # no servidor (este plano de hospedagem não tem variável de ambiente no painel).
      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /domains/vilela.eng.br/public_html/applouvor/site/
          local-dir: ./site/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/test-results/**
            **/playwright-report/**
            **/playwright.config.ts
            **/package.json
            **/package-lock.json
            **/uploads/**
            **/scripts/**
            **/tools/**
            **/memory/**
            **/.planning/**
            **/.stitch/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            **/.antigravitycli/**
            **/skills-lock.json
            **/*.bkp
            **/desktop.ini
            **/CLAUDE.md
            **/GEMINI.md
            **/README.md
            **/DEPLOY.md
            **/run_server.bat
            **/run_tests.bat
            **/push-deploy.ps1
            **/extract.js
            **/db_test.php
            **/test_db.php
            **/debug_*.php
            **/database/data/**
            **/database/seeds/**
