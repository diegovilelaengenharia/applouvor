name: Deploy App Louvor para Hostinger via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Gerar arquivo de credenciais a partir dos Secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          # Gera o arquivo db_credentials.php na pasta de configuração
          php -r '
            $data = [
              "DB_HOST"           => getenv("DB_HOST"),
              "DB_NAME"           => getenv("DB_NAME"),
              "DB_USER"           => getenv("DB_USER"),
              "DB_PASS"           => getenv("DB_PASS"),
              "VAPID_PUBLIC_KEY"  => getenv("VAPID_PUBLIC_KEY"),
              "VAPID_PRIVATE_KEY" => getenv("VAPID_PRIVATE_KEY"),
            ];
            $hdr = "<?php\n// Generated by GitHub Actions run " . getenv("BUILD_RUN_ID") . " at " . gmdate("c") . "\n// Do NOT commit. Generated automatically by deploy.yml.\nreturn ";
            
            // Garante que a pasta src/config existe antes de escrever
            if (!is_dir("src/config")) {
                mkdir("src/config", 0755, true);
            }
            file_put_contents("src/config/db_credentials.php", $hdr . var_export($data, true) . ";\n");
          '

      - name: Upload db_credentials.php via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -c "
            set cmd:fail-exit true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set net:timeout 30;
            open -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST};
            cd /domains/louvor.vilela.eng.br/public_html/src/config/;
            put src/config/db_credentials.php;
            bye;
          "

      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /domains/louvor.vilela.eng.br/public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/test-results/**
            **/playwright-report/**
            **/playwright.config.ts
            **/package.json
            **/package-lock.json
            **/uploads/**
            **/scripts/**
            **/tools/**
            **/memory/**
            **/.planning/**
            **/.stitch/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            **/.antigravitycli/**
            **/skills-lock.json
            **/*.bkp
            **/desktop.ini
            **/CLAUDE.md
            **/GEMINI.md
            **/README.md
            **/DEPLOY.md
            **/run_server.bat
            **/run_tests.bat
            **/push-deploy.ps1
            **/extract.js
            **/db_test.php
            **/test_db.php
            **/debug_*.php
            **/database/data/**
            **/database/seeds/**
