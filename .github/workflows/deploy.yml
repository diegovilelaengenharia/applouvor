name: Deploy App Louvor para Hostinger via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Embutir credenciais em config.php
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          cat > /tmp/inject_creds.php << 'PHPSCRIPT'
          <?php
          $host = addslashes(getenv('DB_HOST'));
          $name = addslashes(getenv('DB_NAME'));
          $user = addslashes(getenv('DB_USER'));
          $pass = addslashes(getenv('DB_PASS'));
          $run  = getenv('BUILD_RUN_ID');

          $newBlock = "// CRED_START — gerado pelo CI run {$run}\n"
                    . "    define('DB_HOST', '{$host}');\n"
                    . "    define('DB_NAME', '{$name}');\n"
                    . "    define('DB_USER', '{$user}');\n"
                    . "    define('DB_PASS', '{$pass}');\n"
                    . "    // CRED_END";

          $config = file_get_contents('src/config/config.php');
          $updated = preg_replace('~// CRED_START.*?// CRED_END~s', $newBlock, $config);

          if ($updated === null || $updated === $config) {
              echo "AVISO: preg_replace nao substituiu nada — verificar CRED_START no config.php\n";
              echo substr($config, 0, 300) . "\n";
          } else {
              file_put_contents('src/config/config.php', $updated);
              echo "config.php OK — credenciais injetadas (run {$run})\n";
          }

          $data = [
            'DB_HOST'           => getenv('DB_HOST'),
            'DB_NAME'           => getenv('DB_NAME'),
            'DB_USER'           => getenv('DB_USER'),
            'DB_PASS'           => getenv('DB_PASS'),
            'VAPID_PUBLIC_KEY'  => getenv('VAPID_PUBLIC_KEY'),
            'VAPID_PRIVATE_KEY' => getenv('VAPID_PRIVATE_KEY'),
          ];
          $hdr = "<?php\n// Generated by CI run {$run} — Do NOT commit.\nreturn ";
          if (!is_dir('src/config')) { mkdir('src/config', 0755, true); }
          file_put_contents('src/config/db_credentials.php', $hdr . var_export($data, true) . ";\n");
          echo "db_credentials.php OK\n";
          PHPSCRIPT
          php /tmp/inject_creds.php

      - name: Deploy via FTP para Hostinger
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /domains/louvor.vilela.eng.br/public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/test-results/**
            **/playwright-report/**
            **/playwright.config.ts
            **/package.json
            **/package-lock.json
            **/uploads/**
            **/scripts/**
            **/tools/**
            **/memory/**
            **/.planning/**
            **/.stitch/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            **/.antigravitycli/**
            **/skills-lock.json
            **/*.bkp
            **/desktop.ini
            **/CLAUDE.md
            **/GEMINI.md
            **/README.md
            **/DEPLOY.md
            **/run_server.bat
            **/run_tests.bat
            **/push-deploy.ps1
            **/extract.js
            **/db_test.php
            **/test_db.php
            **/debug_*.php
            **/database/data/**
            **/database/seeds/**

      - name: Upload credenciais via Python FTPS (sempre executa)
        if: always()
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python3 - << 'PYEOF'
          import ftplib, ssl, os, sys, time, re

          host     = os.environ['FTP_HOST']
          user     = os.environ['FTP_USER']
          password = os.environ['FTP_PASS']

          # Verifica se config.php foi modificado corretamente
          with open('src/config/config.php', 'r', encoding='utf-8') as f:
              content = f.read()

          if 'CRED_START' in content and "define('DB_PASS', '');" in content:
              print("ERRO: config.php ainda tem placeholder vazio — injecao falhou!")
              sys.exit(1)
          else:
              m = re.search(r"define\('DB_HOST',\s*'([^']*)'\)", content)
              p = re.search(r"define\('DB_PASS',\s*'([^']*)'\)", content)
              print(f"config.php OK: DB_HOST={m.group(1) if m else '?'}, DB_PASS len={len(p.group(1)) if p else '?'}")

          files_to_upload = [
              ('src/config/config.php',        '/domains/louvor.vilela.eng.br/public_html/src/config/config.php'),
              ('src/config/db_credentials.php', '/domains/louvor.vilela.eng.br/public_html/src/config/db_credentials.php'),
              ('diag.php',                      '/domains/louvor.vilela.eng.br/public_html/diag.php'),
          ]

          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode    = ssl.CERT_NONE

          for attempt in range(3):
              try:
                  print(f"Tentativa {attempt+1}/3: conectando {host}:21 ...")
                  with ftplib.FTP_TLS(context=ctx) as ftp:
                      ftp.connect(host, 21, timeout=30)
                      ftp.login(user, password)
                      ftp.prot_p()
                      print(f"Conectado!")

                      for local_path, remote_path in files_to_upload:
                          remote_dir  = remote_path.rsplit('/', 1)[0]
                          remote_file = remote_path.rsplit('/', 1)[1]
                          print(f"  put {local_path} -> {remote_path}")
                          ftp.cwd(remote_dir)
                          with open(local_path, 'rb') as f:
                              ftp.storbinary(f'STOR {remote_file}', f)
                          print(f"  OK")

                  print("Upload concluido com sucesso!")
                  sys.exit(0)

              except Exception as e:
                  print(f"Tentativa {attempt+1} falhou: {e}")
                  if attempt < 2:
                      print("Aguardando 15s antes de nova tentativa...")
                      time.sleep(15)
                  else:
                      print("Todas as tentativas esgotadas.")
                      sys.exit(1)
          PYEOF
