name: Deploy App Louvor para Hostinger via FTP

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # FASE 00 (ciclo v7): credenciais de banco NÃO viajam mais pelo pipeline. O PHP em
      # produção lê DB_HOST/DB_NAME/DB_USER/DB_PASS via getenv(), cadastradas direto no painel
      # Hostinger (PHP > Variáveis de Ambiente). Isto substitui as duas etapas antigas deste
      # workflow (injeção em config.php via CI + upload paralelo de db_credentials.php por
      # FTPS em Python) — eram o contorno que sustentou 10 commits fix:/temp:/diag: no ciclo v6
      # e nunca deu estável. Ver .governanca/fases/FASE-00-PLANO.md e HANDOFF.md.
      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /domains/louvor.vilela.eng.br/public_html/
          local-dir: ./site/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/test-results/**
            **/playwright-report/**
            **/playwright.config.ts
            **/package.json
            **/package-lock.json
            **/uploads/**
            **/scripts/**
            **/tools/**
            **/memory/**
            **/.planning/**
            **/.stitch/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            **/.antigravitycli/**
            **/skills-lock.json
            **/*.bkp
            **/desktop.ini
            **/CLAUDE.md
            **/GEMINI.md
            **/README.md
            **/DEPLOY.md
            **/run_server.bat
            **/run_tests.bat
            **/push-deploy.ps1
            **/extract.js
            **/db_test.php
            **/test_db.php
            **/debug_*.php
            **/database/data/**
            **/database/seeds/**
