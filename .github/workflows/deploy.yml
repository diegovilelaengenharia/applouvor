name: Deploy App Louvor para Hostinger via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Embutir credenciais em config.php
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          cat > /tmp/inject_creds.php << 'PHPSCRIPT'
          <?php
          $host = addslashes(getenv('DB_HOST'));
          $name = addslashes(getenv('DB_NAME'));
          $user = addslashes(getenv('DB_USER'));
          $pass = addslashes(getenv('DB_PASS'));
          $run  = getenv('BUILD_RUN_ID');

          // Embute credenciais direto no bloco CRED_START..CRED_END de config.php
          $newBlock = "// CRED_START — gerado pelo CI run {$run}\n"
                    . "    define('DB_HOST', '{$host}');\n"
                    . "    define('DB_NAME', '{$name}');\n"
                    . "    define('DB_USER', '{$user}');\n"
                    . "    define('DB_PASS', '{$pass}');\n"
                    . "    // CRED_END";

          $config = file_get_contents('src/config/config.php');
          $config = preg_replace('~// CRED_START.*?// CRED_END~s', $newBlock, $config);
          file_put_contents('src/config/config.php', $config);

          echo "config.php atualizado com credenciais do CI run {$run}\n";

          // Gera db_credentials.php como arquivo auxiliar
          $data = [
            'DB_HOST'           => getenv('DB_HOST'),
            'DB_NAME'           => getenv('DB_NAME'),
            'DB_USER'           => getenv('DB_USER'),
            'DB_PASS'           => getenv('DB_PASS'),
            'VAPID_PUBLIC_KEY'  => getenv('VAPID_PUBLIC_KEY'),
            'VAPID_PRIVATE_KEY' => getenv('VAPID_PRIVATE_KEY'),
          ];
          $hdr = "<?php\n// Generated by CI run {$run} — Do NOT commit.\nreturn ";
          if (!is_dir('src/config')) { mkdir('src/config', 0755, true); }
          file_put_contents('src/config/db_credentials.php', $hdr . var_export($data, true) . ";\n");
          PHPSCRIPT
          php /tmp/inject_creds.php

      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /domains/louvor.vilela.eng.br/public_html/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/test-results/**
            **/playwright-report/**
            **/playwright.config.ts
            **/package.json
            **/package-lock.json
            **/uploads/**
            **/scripts/**
            **/tools/**
            **/memory/**
            **/.planning/**
            **/.stitch/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            **/.antigravitycli/**
            **/skills-lock.json
            **/*.bkp
            **/desktop.ini
            **/CLAUDE.md
            **/GEMINI.md
            **/README.md
            **/DEPLOY.md
            **/run_server.bat
            **/run_tests.bat
            **/push-deploy.ps1
            **/extract.js
            **/db_test.php
            **/test_db.php
            **/debug_*.php
            **/database/data/**
            **/database/seeds/**

      - name: Upload config.php com credenciais via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -c "
            set cmd:fail-exit true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set net:timeout 30;
            open -u '${FTP_USER}','${FTP_PASS}' ${FTP_HOST};
            cd /domains/louvor.vilela.eng.br/public_html/src/config/;
            put src/config/config.php;
            put src/config/db_credentials.php;
            bye;
          "
