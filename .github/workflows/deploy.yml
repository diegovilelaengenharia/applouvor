name: Deploy App Louvor para Hostinger via FTP (manual, fallback)

# FASE 00 (ciclo v7), 2026-07-16: achado crítico — existe um WEBHOOK nativo da Hostinger
# (GitHub → webhooks.hostinger.com/deploy/..., configurado em 2026-02-11, anterior a este
# ciclo) que clona o repo inteiro em CADA push para /domains/vilela.eng.br/public_html/
# applouvor/ — é essa pasta que o subdomínio louvor.vilela.eng.br realmente serve (não a
# pasta que este workflow sobe por FTP). Esse webhook é agora o mecanismo OFICIAL de deploy
# (mais simples: zero credencial no CI, já funcionava desde antes do ciclo v6 sem que
# ninguém soubesse). Proteção de pastas internas + roteamento pra site/ ficam no `.htaccess`
# da RAIZ do repo (não em site/.htaccess), porque é a raiz que o webhook publica.
#
# Este workflow FTP fica só como fallback manual (workflow_dispatch) — não dispara mais
# sozinho no push, pra não competir com o webhook. Ver .governanca/fases/FASE-00-PLANO.md
# §"Achado crítico" e LICOES.md pra o histórico completo da investigação.

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # Credenciais de banco NÃO viajam pelo pipeline. O PHP em produção lê
      # DB_HOST/DB_NAME/DB_USER/DB_PASS via getenv(), lidas de um .env colocado manualmente
      # no servidor (este plano de hospedagem não tem variável de ambiente no painel).
      - name: Deploy via FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          server-dir: /domains/louvor.vilela.eng.br/public_html/
          local-dir: ./site/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/test-results/**
            **/playwright-report/**
            **/playwright.config.ts
            **/package.json
            **/package-lock.json
            **/uploads/**
            **/scripts/**
            **/tools/**
            **/memory/**
            **/.planning/**
            **/.stitch/**
            **/.agents/**
            **/.claude/**
            **/.cursor/**
            **/.codeium/**
            **/.antigravitycli/**
            **/skills-lock.json
            **/*.bkp
            **/desktop.ini
            **/CLAUDE.md
            **/GEMINI.md
            **/README.md
            **/DEPLOY.md
            **/run_server.bat
            **/run_tests.bat
            **/push-deploy.ps1
            **/extract.js
            **/db_test.php
            **/test_db.php
            **/debug_*.php
            **/database/data/**
            **/database/seeds/**
